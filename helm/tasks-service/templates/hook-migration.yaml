apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-migration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: run-migrations
          image: postgres:18-alpine
          command:
            - "sh"
            - "-c"
            - "psql $DATABASE_URL -f /scripts/init.sql"
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-tasks-service-config
            {{- if .Values.secrets }}
            - secretRef:
                name: {{ .Release.Name }}-tasks-service-secret
            {{- end }}
          volumeMounts:
            - name: init-sql-script
              mountPath: /scripts
      volumes:
        - name: init-sql-script
          configMap:
            name: {{ .Release.Name }}-init-sql
