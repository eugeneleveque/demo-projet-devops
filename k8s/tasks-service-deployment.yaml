apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-projet-devops-tasks-service
  labels:
    app: demo-projet-devops-tasks-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-projet-devops-tasks-service
  template:
    metadata:
      labels:
        app: demo-projet-devops-tasks-service
    spec:
      containers:
        - name: demo-projet-devops-tasks-service
          image: demo-projet-devops-tasks-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              value: "postgres://taskuser:taskpass@host.docker.internal:5432/taskdb"
